{% extends "base.html" %}
{% block title %}Register — Family Portal{% endblock %}
{% block content %}
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle text-muted">Join your family portal</p>

      {% if message %}
        <div class="alert alert-error">{{ message }}</div>
      {% endif %}

      <form method="POST" action="/register">
        <div class="form-row">
          <div class="form-group">
            <label for="first_name">First Name <span class="required">*</span></label>
            <input type="text" id="first_name" name="first_name" class="form-input" required />
          </div>
          <div class="form-group">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name" name="last_name" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" class="form-input" required />
        </div>
        <div class="form-group">
          <label for="username">Username <span class="required">*</span></label>
          <input type="text" id="username" name="username" class="form-input" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input type="password" id="password" name="password" class="form-input" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password <span class="required">*</span></label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-input" required autocomplete="new-password" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </div>
      </form>
      <p class="auth-footer text-muted">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
{% endblock %}
