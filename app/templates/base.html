<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Family Portal{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">🏠 Family Portal</a>
      <nav class="site-nav">
        {% if request.session.get("user_id") %}
          <a href="/">Home</a>
          <a href="/recipes">Recipes</a>
          <a href="/calendar">Calendar</a>
          <a href="/tasks">Tasks</a>
          <a href="/family">Family</a>
          <a href="/logout" class="nav-logout">Logout</a>
        {% else %}
          <a href="/login">Login</a>
          <a href="/register">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Family Portal &mdash; Keeping our family organized.</p>
    </div>
  </footer>
</body>
</html>
