{% extends "base.html" %}
{% block title %}Login — Family Portal{% endblock %}
{% block content %}
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle text-muted">Sign in to your family portal</p>

      {% if message %}
        <div class="alert alert-error">{{ message }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password" />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </div>
      </form>
      <p class="auth-footer text-muted">Don't have an account? <a href="/register">Create one</a></p>
    </div>
  </div>
{% endblock %}
